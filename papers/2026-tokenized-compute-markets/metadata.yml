abstract: >
  AI inference is becoming a foundational economic resource, yet its supply is concentrated.
  This paper presents Tokenized Compute Markets, a mechanism coupling capital formation,
  physical infrastructure deployment, and AI inference into a self-growing economic loop.
  Trading activity finances new machines through a Hardware Fund, while inference is priced
  in a stable unit and settled in a cluster token. The paper gives the formal mechanics,
  incentive analysis, security model, settlement model, capacity illustrations, and explicit
  failure modes.
